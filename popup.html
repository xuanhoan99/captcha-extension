<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Captcha Test Helper</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>Captcha Test Helper</h1>
        <div class="header-actions">
          <button id="openPanel" type="button">Open Panel</button>
          <span id="status">Ready</span>
        </div>
      </header>
      <p id="buildVersion">Build: loading</p>

      <section class="panel">
        <label>
          Domain test
          <input id="allowedHost" placeholder="vd: localhost hoac example.test">
        </label>
        <label>
          Selector anh captcha
          <input id="captchaSelector" placeholder="vd: img.captcha">
        </label>
        <label>
          Selector input
          <input id="inputSelector" placeholder="vd: input[name=captcha]">
        </label>
        <label>
          Selector form/nut submit
          <input id="submitSelector" placeholder="vd: form hoac button[type=submit]">
        </label>
        <label>
          Selector submit phu
          <input id="fallbackSubmitSelector" placeholder="vd: button.bg-red-600">
        </label>
        <label>
          Selector nut Cancel khi sai
          <input id="cancelSelector" placeholder="vd: text:CANCEL">
        </label>
        <label>
          Text bao sai captcha
          <input id="incorrectCodeText" placeholder="vd: Incorrect code">
        </label>
        <label>
          Click truoc khi OCR
          <input id="preClickSelector" placeholder="vd: input[name=phone] hoac button.send-code">
        </label>
      </section>

      <section class="panel switches">
        <label class="check">
          <input type="checkbox" id="enabled">
          Bat extension
        </label>
        <label class="check">
          <input type="checkbox" id="autoFill">
          Tu dien sau khi nhan dien
        </label>
        <label class="check">
          <input type="checkbox" id="autoSubmit">
          Tu submit sau khi dien
        </label>
        <label class="check">
          <input type="checkbox" id="autoRetryOnIncorrect">
          Tu Cancel va chay lai khi sai
        </label>
        <label class="check">
          <input type="checkbox" id="autoWatch">
          Tu phat hien captcha
        </label>
        <label class="check">
          <input type="checkbox" id="targetTabOnly">
          Chi chay tab target
        </label>
      </section>

      <section class="panel">
        <label>
          Delay submit (ms)
          <input id="submitDelayMs" type="number" min="0" step="100" placeholder="vd: 1000">
        </label>
        <label>
          Cho bao sai (ms)
          <input id="incorrectWaitMs" type="number" min="0" step="100" placeholder="vd: 1800">
        </label>
        <label>
          Delay chay lai sau Cancel (ms)
          <input id="retryAfterCancelMs" type="number" min="0" step="100" placeholder="vd: 800">
        </label>
        <label>
          Cho click enable (ms)
          <input id="preClickTimeoutMs" type="number" min="0" step="1000" placeholder="vd: 10000">
        </label>
        <label>
          Max mau train
          <input id="maxTemplates" type="number" min="10" step="10" placeholder="vd: 400">
        </label>
        <div class="actions">
          <button id="trainFromInput" type="button">Train tu input</button>
          <button id="run">Chay thu</button>
          <button id="clear">Xoa mau</button>
        </div>
        <p id="templates">0 mau da luu</p>
        <div id="templateCounts"></div>
      </section>

      <section class="panel import-panel">
        <div class="actions">
          <button id="exportTemplates" type="button">Export file JSON</button>
          <button id="chooseTemplateFile" type="button">Chon file JSON</button>
          <button id="importTemplates" type="button">Import file</button>
        </div>
        <input id="templateFile" type="file" accept="application/json,.json">
        <textarea id="templateJson" placeholder="Dan JSON mau train o day"></textarea>
      </section>

      <section class="panel log-panel">
        <div class="log-head">
          <strong>Log test</strong>
          <button id="clearLog" type="button">Clear</button>
        </div>
        <pre id="log"></pre>
      </section>
    </main>
    <script src="defaults.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
