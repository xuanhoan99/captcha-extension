<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Captcha Test Helper</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>Captcha Test Helper</h1>
        <div class="header-actions">
          <button id="openPanel" type="button">Open Panel</button>
          <span id="status">Ready</span>
        </div>
      </header>

      <section class="panel">
        <label>
          Domain test
          <input id="allowedHost" placeholder="vd: localhost hoặc example.test">
        </label>
        <label>
          Selector ảnh captcha
          <input id="captchaSelector" placeholder="vd: img.captcha">
        </label>
        <label>
          Selector input
          <input id="inputSelector" placeholder="vd: input[name=captcha]">
        </label>
        <label>
          Selector form/nút submit
          <input id="submitSelector" placeholder="vd: form hoặc button[type=submit]">
        </label>
        <label>
          Click trước khi OCR
          <input id="preClickSelector" placeholder="vd: input[name=phone] hoặc button.send-code">
        </label>
        <label>
          Số ký tự captcha
          <input id="captchaLength" type="number" min="0" step="1" placeholder="đang tối ưu cố định 3">
        </label>
      </section>

      <section class="panel switches">
        <label class="check">
          <input type="checkbox" id="autoFill">
          Tự điền sau khi nhận diện
        </label>
        <label class="check">
          <input type="checkbox" id="autoSubmit">
          Tự submit sau khi điền
        </label>
        <label class="check">
          <input type="checkbox" id="allowAlphanumeric">
          Cho phép chữ + số (không dùng ở mode 3 số)
        </label>
        <label class="check">
          <input type="checkbox" id="autoWatch">
          Tự phát hiện captcha
        </label>
      </section>

      <section class="panel">
        <label>
          Mã đúng để train mẫu
          <input id="trainingValue" inputmode="numeric" maxlength="3" placeholder="vd: 213">
        </label>
        <label>
          Delay submit (ms)
          <input id="submitDelayMs" type="number" min="0" step="100" placeholder="vd: 1000">
        </label>
        <label>
          Chờ click enable (ms)
          <input id="preClickTimeoutMs" type="number" min="0" step="1000" placeholder="vd: 10000">
        </label>
        <div class="actions">
          <button id="train">Train</button>
          <button id="trainFromInput" type="button">Train từ input</button>
          <button id="run">Chạy thử</button>
          <button id="clear">Xóa mẫu</button>
          <button id="debug" type="button">Debug OCR</button>
        </div>
        <p id="templates">0 mẫu đã lưu</p>
        <div id="templateCounts"></div>
      </section>

      <section class="panel debug-panel">
        <div class="debug-head">
          <strong>Preview OCR</strong>
          <span id="debugInfo">Chưa có ảnh</span>
        </div>
        <img id="debugMask" alt="OCR mask preview">
        <div id="debugSegments"></div>
      </section>

      <section class="panel log-panel">
        <div class="log-head">
          <strong>Log test</strong>
          <button id="clearLog" type="button">Clear</button>
        </div>
        <pre id="log"></pre>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
